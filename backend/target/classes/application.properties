# ============================================================
# LifeLink Application Configuration
# ============================================================

spring.application.name=lifelink

# ============================================================
# DATABASE - H2 (default local setup)
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/lifelinkdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# MySQL (optional override)
# ============================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/lifelink?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT
# ============================================================
app.jwt.secret=LifeLinkSuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024
app.jwt.expiration=86400000

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Password reset
# ============================================================
app.security.password-reset.expiry-minutes=15
app.frontend.reset-password-url=http://localhost:5173/reset-password

# ============================================================
# Mail (configure real SMTP credentials in your environment)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.require-smtp=false

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ============================================================
# Logging
# ============================================================
logging.level.com.lifelink=INFO
logging.level.org.springframework.security=WARN
