spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

app.jwt.secret=LifeLinkSuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024
app.jwt.expiration=86400000
app.cors.allowed-origins=http://localhost:5173
app.security.password-reset.expiry-minutes=15
app.frontend.reset-password-url=http://localhost:5173/reset-password
app.mail.require-smtp=false
